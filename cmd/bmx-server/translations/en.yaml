configuration:
  api_secret:
    name: "Proxy API Secret"
    description: "An optional security token to authenticate incoming API requests made to this proxy."
  butterflymx_api_token:
    name: "ButterflyMX API Token"
    description: "The default Bearer token to communicate with the upstream ButterflyMX API."
  enable_mtls:
    name: "Enable mutual TLS (mTLS)"
    description: "Require client certificates to authenticate incoming requests."
  tls_cert_path:
    name: "TLS Certificate Path"
    description: "Path to the TLS certificate file (.crt / .pem) for securing communication over HTTPS."
  tls_key_path:
    name: "TLS Private Key Path"
    description: "Path to the TLS private key file (.key) for securing communication over HTTPS."
  client_ca_path:
    name: "Client CA Certificate Path"
    description: "Path to the CA certificate PEM file used to verify client certificates when mTLS is enabled."
network:
  80/tcp: "The ButterflyMX Proxy Server service port"
